image: node:20-bookworm

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

stages:
  - validate

variables:
  NODE_ENV: test
  POSTGRES_DB: traveling
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  DATABASE_URL: postgresql://postgres:postgres@postgres:5432/traveling
  DIRECT_URL: postgresql://postgres:postgres@postgres:5432/traveling
  REDIS_URL: redis://redis:6379
  CLERK_SECRET_KEY: test_clerk_secret
  OPENAI_API_KEY: test_openai
  DEEPL_API_KEY: test_deepl
  GOOGLE_CLOUD_API_KEY: test_google_cloud
  GOOGLE_PLACES_API_KEY: test_google_places
  SERPAPI_KEY: test_serpapi
  APIFY_API_KEY: test_apify
  EXCHANGERATE_API_KEY: test_exchange
  OPENWEATHER_API_KEY: test_weather
  REVENUECAT_API_KEY: test_revenuecat
  TWILIO_ACCOUNT_SID: AC_test_twilio_sid
  TWILIO_AUTH_TOKEN: test_twilio_token
  TWILIO_FROM_NUMBER: '+15551234567'

validate:
  stage: validate
  services:
    - name: postgres:16-alpine
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  before_script:
    - npm ci
  script:
    - npm audit --omit=dev --audit-level=high
    - npm run prisma:generate --workspace @traveling/backend
    - npm run prisma:deploy --workspace @traveling/backend
    - npm run typecheck
    - npm run lint
    - npm test --workspace apps/backend
    - npm test --workspace apps/mobile
    - npm run build
