name: EAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: EAS target platform
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios
      profile:
        description: EAS build profile
        required: true
        default: production
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  eas:
    name: Build mobile app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        working-directory: .
        run: npm ci

      - name: Build shared package
        working-directory: .
        run: npm run build --workspace @traveling/shared

      - name: Setup EAS
        run: npm install --global eas-cli

      - name: Run EAS build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_API_KEY }}
        run: eas build --platform "${{ inputs.platform }}" --profile "${{ inputs.profile }}" --non-interactive
